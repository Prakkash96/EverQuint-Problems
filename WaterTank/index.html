<!DOCTYPE html>
<html>

<head>
    <title>Water Tank Problem</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Water Tank Problem</h1>
        <div class="input-section">
            <input id="arrayInput" type="text" value="0,4,0,0,0,6,0,6,4,0"
                placeholder="Enter heights e.g. 0,4,0,0,0,6,0,6,4,0">
            <button onclick="solve()">Compute</button>
        </div>
        <div class="panel">
            <div class="grid-section">
                <h2>Input Terrain</h2>
                <div id="inputGrid" class="grid"></div>
            </div>
            <div class="grid-section">
                <h2>Output (Water Stored)</h2>
                <div id="outputGrid" class="grid"></div>
            </div>
        </div>
        <h2 id="result">Stored Water: 0 Units</h2>
    </div>
    <script src="script.js"></script>
</body>

</html>
